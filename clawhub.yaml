name: i-am
version: 4.0.0
description: Zero-config personality analysis. All-in-one SKILL.md with embedded code. AI-guided, IM-adaptive.
author: i-am Team
license: MIT
repository: https://github.com/Designer-Awei/i-am
tags:
  - psychology
  - user-modeling
  - grounded-theory
  - act-r
  - zero-config
  - all-in-one
category: productivity
min_openclaw_version: 2026.3.0

entry_point: SKILL.md

commands:
  - name: install
    description: Install and configure (asks: scheduled/manual)
    usage: Follow SKILL.md workflow
  - name: analyze
    description: Run personality analysis
    usage: Tell AI "运行 i-am 分析"
  - name: update
    description: Update USER.md after confirmation
    usage: Reply "确认" after preview

features:
  - name: All-in-One SKILL.md
    description: All logic and code embedded in SKILL.md
  - name: AI-Guided Installation
    description: AI asks user for mode (scheduled/manual)
  - name: IM-Adaptive
    description: AI chooses file sending method based on current IM
  - name: Zero-Config
    description: No external API keys, uses current session model
  - name: User Confirmation
    description: Updates USER.md only after user confirms

security_notes:
  - No external network calls
  - All data stays local
  - No hardcoded API keys
  - Review code before installing
